name: Self-Healing Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Additional instructions for the agent'
        required: false
        default: ''
      run_id:
        description: 'CI run ID to fetch logs from (auto-detected if empty)'
        required: false
        default: ''
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
    branches: [main]

env:
  MAX_RETRIES: 3

jobs:
  autonomous-agent-fix:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Determine CI run ID and commit SHA
        id: context
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            RUN_ID="${{ inputs.run_id }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
          else
            RUN_ID=""
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Fetch CI failure logs
        id: logs
        if: steps.context.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          RUN_ID="${{ steps.context.outputs.run_id }}"
          echo "Fetching logs for run $RUN_ID..."
          gh run view "$RUN_ID" --repo "${{ github.repository }}" --log 2>/dev/null > /tmp/ci-logs.txt || echo "(no logs available)"
          echo "Fetched $(wc -l < /tmp/ci-logs.txt) lines of CI logs"

      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.context.outputs.sha }}

      - name: Install System Utilities & Python env
        run: |
          sudo apt-get update -qq && sudo apt-get install -yq cmake ninja-build python3-pip
          pip3 install aider-chat --break-system-packages

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and accept licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "ndk;27.0.12077973" 2>&1 || sdkmanager --install "ndk;26.1.10909125" 2>&1
          NDK_DIR=$(ls -d ${ANDROID_HOME}/ndk/2* | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Agent fix loop
        id: agent
        env:
          OLLAMA_API_BASE: "https://ollama.akinus21.com"
          AIDER_MODEL: "ollama_chat/minimax-m2.7:cloud"
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git config --global user.name "AkAgent Bot"
          git config --global user.email "aktags-bot@akinus21.com"

          MAX_RETRIES=${{ env.MAX_RETRIES }}
          RETRY=0

          # Build initial prompt
          PROMPT="You are a self-healing CI agent for the akai-android-agent project.
          Read AGENTS.md for project context.

          Your job: fix the build so CI passes.

          IMPORTANT CONTEXT:
          - The full CI build (including cross-compiling.rpc-server with Vulkan for Android) only runs on CI, not here.
          - You CAN build and test the Rust and Android parts locally with: cd rust && cargo ndk -t arm64-v8a build --release && cd .. && ./gradlew assembleDebug
          - For rpc-server/Vulkan/SPIRV/Header issues, you must fix the .github/workflows/build.yml file — you cannot build those locally here.
          - Always read .github/workflows/build.yml before making changes to understand the full build pipeline.
          - After fixing, commit and push. CI will re-run automatically.
          - Do NOT modify the self-healing agent workflow (.github/workflows/agent.yml).
          "

          if [ -f /tmp/ci-logs.txt ] && [ -s /tmp/ci-logs.txt ]; then
            PROMPT="$PROMPT

          CI BUILD LOGS (failure context):
          ---
          $(tail -200 /tmp/ci-logs.txt)
          ---"
          fi

          if [ -n "${{ inputs.prompt }}" ]; then
            PROMPT="$PROMPT

          Additional instructions: ${{ inputs.prompt }}"
          fi

          echo "=== Self-Healing Agent: max $MAX_RETRIES iteration(s) ==="

          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            echo ""
            echo "=== Iteration $RETRY of $MAX_RETRIES ==="

            # Try a local Rust+Android build first (skip if only workflow fixes needed)
            echo "Attempting local Rust + Android build..."
            (cd rust && cargo ndk -t arm64-v8a build --release 2>&1 | tail -5) || true
            ./gradlew assembleDebug 2>&1 | tail -20 > /tmp/gradle-output.txt || true

            echo "Spawning Aider agent (model: minimax-m2.7:cloud)..."
            aider --architect \
              --message "$PROMPT" \
              --no-stream \
              --yes || true

            # Check if aider made any changes
            if git diff --quiet HEAD && [ "$(git status --porcelain)" = "" ]; then
              echo "Aider made no changes. Retrying with updated context..."
              sleep 5
              continue
            fi

            # Commit and push changes
            git add -A
            git commit -m "fix: agent iteration $RETRY — self-healing fix" || true
            git push "https://x-access-token:${{ secrets.GH_TOKEN || github.token }}@github.com/${{ github.repository }}.git" HEAD:main
            echo "Pushed fix iteration $RETRY"

            # Wait for CI to start and complete
            echo "Waiting 60s for CI to trigger..."
            sleep 60

            # Poll CI status
            for i in $(seq 1 60); do
              STATUS=$(gh run list --repo "${{ github.repository }}" --branch main --limit 1 --json status,conclusion,databaseId --jq '.[0]' 2>/dev/null || echo "{}")
              RUN_STATUS=$(echo "$STATUS" | jq -r '.status // "unknown"')
              RUN_CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // "running"')
              RUN_DB_ID=$(echo "$STATUS" | jq -r '.databaseId // "0"')

              echo "  CI run $RUN_DB_ID: status=$RUN_STATUS conclusion=$RUN_CONCLUSION"

              if [ "$RUN_STATUS" = "completed" ]; then
                if [ "$RUN_CONCLUSION" = "success" ]; then
                  echo ""
                  echo "=== BUILD PASSED on iteration $RETRY! ==="
                  echo "pass=true" >> $GITHUB_OUTPUT
                  exit 0
                else
                  echo "CI failed again. Fetching logs for next iteration..."
                  gh run view "$RUN_DB_ID" --repo "${{ github.repository }}" --log 2>/dev/null > /tmp/ci-logs.txt || true
                  # Update prompt with new failure logs
                  PROMPT="The fix you applied did not resolve the CI build. Here are the new failure logs:

          ---
          $(tail -200 /tmp/ci-logs.txt 2>/dev/null || echo "Could not fetch logs")
          ---

          Try a different approach. Remember: for Vulkan/cross-compile issues, fix .github/workflows/build.yml.

          Do NOT modify .github/workflows/agent.yml."
                  break
                fi
              fi
              echo "  Waiting... ($i/60)"
              sleep 30
            done
          done

          echo "=== Agent exhausted $MAX_RETRIES retries without success ==="
          echo "pass=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Result
        if: always()
        run: |
          if [ "${{ steps.agent.outputs.pass }}" = "true" ]; then
            echo "Self-healing succeeded: CI build passes."
          else
            echo "Self-healing failed: could not fix the build within ${{ env.MAX_RETRIES }} iterations."
            echo "Manual intervention required."
          fi