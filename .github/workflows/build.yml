name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -yq cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and accept licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "ndk;27.0.12077973" 2>&1 || sdkmanager --install "ndk;26.1.10909125" 2>&1
          NDK_DIR=$(ls -d ${ANDROID_HOME}/ndk/2* | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK dir: $NDK_DIR"
          ls "$NDK_DIR/toolchains/llvm/prebuilt/" 2>/dev/null || echo "WARNING: prebuilt toolchain dir not found"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust library (arm64-v8a)
        run: |
          cd rust
          cargo ndk -t arm64-v8a build --release 2>&1 | tee /tmp/rust-build-arm64.txt

      - name: Build Rust library (armeabi-v7a)
        run: |
          cd rust
          cargo ndk -t armeabi-v7a build --release 2>&1 | tee /tmp/rust-build-armv7.txt

      - name: Copy native libraries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp rust/target/aarch64-linux-android/release/libakai_tunnel.so app/src/main/jniLibs/arm64-v8a/
          cp rust/target/armv7-linux-androideabi/release/libakai_tunnel.so app/src/main/jniLibs/armeabi-v7a/
          ls -la app/src/main/jniLibs/*/libakai_tunnel.so

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug 2>&1 | tee /tmp/gradle-build-log.txt

      - name: Compute version tag
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: tag
        run: |
          git fetch --tags
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER="${PREV#v}"
          MAJ=$(echo "$VER" | cut -d. -f1 | sed 's/^0*//'); MAJ=${MAJ:-0}
          MIN=$(echo "$VER" | cut -d. -f2 | sed 's/^0*//'); MIN=${MIN:-0}
          PAT=$(echo "$VER" | cut -d. -f3 | sed 's/^0*//'); PAT=${PAT:-0}
          while git rev-parse "v${MAJ}.${MIN}.${PAT}" >/dev/null 2>&1; do
            PAT=$((10#$PAT + 1))
          done
          NEW_TAG="v${MAJ}.${MIN}.${PAT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akai-agent-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git config user.email "aktags-bot@akinus21.com"
          git config user.name "AkTags Bot"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TAG="${{ steps.tag.outputs.new_tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Android APK build" \
            $APK

      - name: Collect build logs on failure
        if: failure()
        run: |
          echo "=== ENV ===" >> /tmp/build-errors.txt
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> /tmp/build-errors.txt
          echo "ANDROID_HOME=$ANDROID_HOME" >> /tmp/build-errors.txt
          echo "" >> /tmp/build-errors.txt
          echo "=== NDK toolchain ===" >> /tmp/build-errors.txt
          ls "${ANDROID_HOME}/ndk/" >> /tmp/build-errors.txt 2>/dev/null || echo "(no ndk dir)" >> /tmp/build-errors.txt
          NDK_DIR="${ANDROID_NDK_HOME:-unknown}"
          ls "$NDK_DIR/toolchains/llvm/prebuilt/" >> /tmp/build-errors.txt 2>/dev/null || echo "(no prebuilt dir)" >> /tmp/build-errors.txt
          echo "" >> /tmp/build-errors.txt
          echo "=== Rust build arm64 ===" >> /tmp/build-errors.txt
          tail -150 /tmp/rust-build-arm64.txt >> /tmp/build-errors.txt 2>/dev/null || echo "(no arm64 log)" >> /tmp/build-errors.txt
          echo "" >> /tmp/build-errors.txt
          echo "=== Rust build armv7 ===" >> /tmp/build-errors.txt
          tail -150 /tmp/rust-build-armv7.txt >> /tmp/build-errors.txt 2>/dev/null || echo "(no armv7 log)" >> /tmp/build-errors.txt
          echo "" >> /tmp/build-errors.txt
          echo "=== Gradle build ===" >> /tmp/build-errors.txt
          tail -100 /tmp/gradle-build-log.txt >> /tmp/build-errors.txt 2>/dev/null || echo "(no gradle log)" >> /tmp/build-errors.txt
          echo "" >> /tmp/build-errors.txt
          echo "=== Built .so files ===" >> /tmp/build-errors.txt
          find rust/target -name 'libakai_tunnel.so' -ls >> /tmp/build-errors.txt 2>/dev/null || echo "(none found)" >> /tmp/build-errors.txt
          echo "" >> /tmp/build-errors.txt
          echo "=== cargo ndk version ===" >> /tmp/build-errors.txt
          cargo ndk --version >> /tmp/build-errors.txt 2>&1 || echo "(cargo ndk not found)" >> /tmp/build-errors.txt
          cat /tmp/build-errors.txt

      - name: Notify webhook — success
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          github.event_name != 'pull_request'
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TAG="${{ steps.tag.outputs.new_tag }}"
          PAYLOAD=$(jq -cn \
            --arg event  "build_success" \
            --arg repo   "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha    "${{ github.sha }}" \
            --arg ref    "${{ github.ref_name }}" \
            --arg actor  "${{ github.actor }}" \
            --arg tag    "$TAG" \
            --arg image  "apk" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,tag:$tag,image:$image}')
          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" | awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true

      - name: Notify webhook — failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -f /tmp/build-errors.txt ]; then
            ERROR_TEXT=$(cat /tmp/build-errors.txt | head -400)
          else
            ERROR_TEXT="Build failed - no log file available. See $RUN_URL"
          fi
          PAYLOAD=$(jq -cn \
            --arg event   "build_failure" \
            --arg repo    "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha     "${{ github.sha }}" \
            --arg ref     "${{ github.ref_name }}" \
            --arg actor   "${{ github.actor }}" \
            --arg error   "$ERROR_TEXT" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,error:$error}')
          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" | awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true