name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -yq cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and accept licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "ndk;27.0.12077973" 2>&1 || sdkmanager --install "ndk;26.1.10909125" 2>&1
          NDK_DIR=$(ls -d ${ANDROID_HOME}/ndk/2* | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK dir: $NDK_DIR"
          ls "$NDK_DIR/toolchains/llvm/prebuilt/" 2>/dev/null || echo "WARNING: prebuilt toolchain dir not found"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Verify NDK and toolchain
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "${ANDROID_HOME}/ndk/" 2>/dev/null || echo "No NDK dir"
          NDK_DIR="${ANDROID_NDK_HOME:-unknown}"
          ls "$NDK_DIR/toolchains/llvm/prebuilt/" 2>/dev/null || echo "No prebuilt dir"
          echo "--- clang binaries ---"
          ls "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/"*clang* 2>/dev/null | head -10 || echo "No clang found"
          echo "--- cargo ndk version ---"
          cargo ndk --version
          echo "--- rustc version ---"
          rustc --version
          echo "--- cargo version ---"
          cargo --version

      - name: Build Rust library (arm64-v8a)
        run: |
          set -o pipefail
          cd rust
          cargo clean 2>/dev/null || true
          echo "--- reqwest features ---"
          cargo tree -p reqwest --features "" 2>/dev/null || true
          cargo ndk -t arm64-v8a build --release --verbose 2>&1 | tee /tmp/rust-build-arm64.txt

      - name: Build Rust library (armeabi-v7a)
        run: |
          set -o pipefail
          cd rust
          cargo ndk -t armeabi-v7a build --release --verbose 2>&1 | tee /tmp/rust-build-armv7.txt

      - name: Copy native libraries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp rust/target/aarch64-linux-android/release/libakai_tunnel_android.so app/src/main/jniLibs/arm64-v8a/
          cp rust/target/armv7-linux-androideabi/release/libakai_tunnel_android.so app/src/main/jniLibs/armeabi-v7a/
          ls -la app/src/main/jniLibs/*/libakai_tunnel_android.so

      - name: Setup OpenCL for Android
        run: |
          set -o pipefail
          cd /tmp
          git clone --depth 1 https://github.com/KhronosGroup/OpenCL-Headers.git
          cp -r OpenCL-Headers/CL $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/
          git clone --depth 1 https://github.com/KhronosGroup/OpenCL-ICD-Loader.git
          cd OpenCL-ICD-Loader
          mkdir build_ndk && cd build_ndk
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DOPENCL_ICD_LOADER_HEADERS_DIR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DANDROID_STL=c++_shared
          ninja
          cp libOpenCL.so $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/

      - name: Build rpc-server for Android arm64
        run: |
          set -o pipefail
          LLAMACPP_VERSION=a8681a0
          git clone https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp
          git checkout $LLAMACPP_VERSION
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DGGML_RPC=ON \
            -DGGML_CUDA=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_OPENCL=ON \
            -DGGML_KQUANT=OFF \
            -DGGML_CPU=ON \
            -DGGML_AVX2=OFF \
            -DGGML_AVX512=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_CURL=OFF \
            2>&1 | tee /tmp/cmake-configure.txt
          cmake --build . --config Release -j$(nproc) --target rpc-server 2>&1 | tee /tmp/rpc-build.txt
          ls -la bin/rpc-server 2>/dev/null || ls -la bin/llama-rpc-server 2>/dev/null || { echo "rpc-server not found"; find . -name 'rpc-server' -o -name 'llama-rpc-server' 2>/dev/null; exit 1; }
          mkdir -p $GITHUB_WORKSPACE/app/src/main/assets/rpc-server/arm64-v8a
          cp bin/rpc-server $GITHUB_WORKSPACE/app/src/main/assets/rpc-server/arm64-v8a/rpc-server 2>/dev/null || \
          cp bin/llama-rpc-server $GITHUB_WORKSPACE/app/src/main/assets/rpc-server/arm64-v8a/rpc-server 2>/dev/null
          chmod 755 $GITHUB_WORKSPACE/app/src/main/assets/rpc-server/arm64-v8a/rpc-server
          ls -la $GITHUB_WORKSPACE/app/src/main/assets/rpc-server/arm64-v8a/rpc-server

      - name: Setup Gradle
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee /tmp/gradle-build-log.txt

      - name: Compute version tag
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: tag
        run: |
          git fetch --tags
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER="${PREV#v}"
          MAJ=$(echo "$VER" | cut -d. -f1 | sed 's/^0*//'); MAJ=${MAJ:-0}
          MIN=$(echo "$VER" | cut -d. -f2 | sed 's/^0*//'); MIN=${MIN:-0}
          PAT=$(echo "$VER" | cut -d. -f3 | sed 's/^0*//'); PAT=${PAT:-0}
          while git rev-parse "v${MAJ}.${MIN}.${PAT}" >/dev/null 2>&1; do
            PAT=$((10#$PAT + 1))
          done
          NEW_TAG="v${MAJ}.${MIN}.${PAT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akai-agent-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.email "aktags-bot@akinus21.com"
          git config user.name "AkTags Bot"
          TAG="${{ steps.tag.outputs.new_tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Android APK build" \
            $APK

      - name: Collect build logs on failure
        if: failure()
        run: |
          {
            echo "=== ENV ==="
            echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo ""
            echo "=== NDK toolchain ==="
            ls "${ANDROID_HOME}/ndk/" 2>/dev/null || echo "(no ndk dir)"
            NDK_DIR="${ANDROID_NDK_HOME:-unknown}"
            ls "$NDK_DIR/toolchains/llvm/prebuilt/" 2>/dev/null || echo "(no prebuilt dir)"
            ls "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/"*clang* 2>/dev/null | head -10 || echo "(no clang)"
            echo ""
            echo "=== Rust build arm64 ==="
            tail -150 /tmp/rust-build-arm64.txt 2>/dev/null || echo "(no arm64 log)"
            echo ""
            echo "=== Rust build armv7 ==="
            tail -150 /tmp/rust-build-armv7.txt 2>/dev/null || echo "(no armv7 log)"
            echo ""
            echo "=== Gradle build ==="
            tail -100 /tmp/gradle-build-log.txt 2>/dev/null || echo "(no gradle log)"
            echo ""
            echo "=== CMake configure ==="
            tail -50 /tmp/cmake-configure.txt 2>/dev/null || echo "(no cmake log)"
            echo ""
            echo "=== rpc-server build ==="
            tail -120 /tmp/rpc-build.txt 2>/dev/null || echo "(no rpc-server log)"
            echo ""
            echo "=== Built .so files ==="
            find rust/target -name 'libakai_tunnel_android.so' -ls 2>/dev/null || echo "(none found)"
            echo ""
            echo "=== cargo ndk version ==="
            cargo ndk --version 2>&1 || echo "(cargo ndk not found)"
          } > /tmp/build-errors.txt
          cat /tmp/build-errors.txt

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/build-errors.txt
          retention-days: 5

  webhook-failure:
    needs: [build]
    if: failure()
    runs-on: ubuntu-latest
    name: Webhook Notification for Build #${{ github.run_number }}
    steps:
      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.run_id }}
          name: build-logs
          path: /tmp/logs
        continue-on-error: true

      - name: Collect logs
        run: |
          LOG_FILE=""
          for f in /tmp/logs/build.log /tmp/logs/build-errors.txt /tmp/rust-build-arm64.txt /tmp/gradle-build-log.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              LOG_FILE="$f"
              break
            fi
          done
          if [ -z "$LOG_FILE" ]; then
            mkdir -p /tmp/logs
            echo "No build logs available" > /tmp/logs/build.log
            LOG_FILE=/tmp/logs/build.log
          fi
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          LINES=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
          echo "LOG_LINES=$LINES" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to pasty
        id: pasty
        run: |
          python3 -c "$(echo '' | base64 -d)"

      - name: Extract errors (max 25 lines)
        id: errors
        run: |
          LOG_FILE="${{ env.LOG_FILE }}"
          if [ -z "$LOG_FILE" ] || [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
            echo "error_context=Build failed. No logs available." >> $GITHUB_OUTPUT
            exit 0
          fi

          ERRORS=$(grep -n -iE 'error\[E[0-9]+\]|error:|fatal|cannot find|not found|compilation failed|FAILED' \
            "$LOG_FILE" 2>/dev/null | head -5 | cut -d: -f1 | tr '\n' ' ')

          if [ -z "$ERRORS" ]; then
            CONTEXT=$(tail -25 "$LOG_FILE" 2>/dev/null)
          else
            CONTEXT=""
            for LINE in $ERRORS; do
              START=$((LINE - 3))
              [ $START -lt 1 ] && START=1
              CHUNK=$(sed -n "${START},$((LINE + 3))p" "$LOG_FILE" 2>/dev/null)
              CONTEXT="${CONTEXT}--- error near line ${LINE} ---\n${CHUNK}\n"
            done
            CONTEXT=$(echo -e "$CONTEXT" | tail -25)
          fi

          echo "error_context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" | head -25 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send webhook
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          PASTY_URL: ${{ steps.pasty.outputs.pasty_url }}
          BUILD_NUM: ${{ github.run_number }}
          ERROR_CTX: ${{ steps.errors.outputs.error_context }}
        run: |
          jq -n \
            --arg event "build_failure" \
            --arg repo "$REPO" \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg pasty_url "$PASTY_URL" \
            --arg build_num "$BUILD_NUM" \
            --arg error "$ERROR_CTX" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,pasty_url:$pasty_url,build_num:$build_num,error:$error}' > /tmp/payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/payload.json | awk '{print "sha256="$2}')
          for i in $(seq 1 60); do
            if curl -fsSL -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: build_failure" \
              -H "X-Hub-Signature-256: $SIG" \
              --data-binary @/tmp/payload.json \
              "https://webhook.akinus21.com/webhook/akai-net-build"; then
              echo "Webhook sent successfully"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Webhook failed after 60 attempts"