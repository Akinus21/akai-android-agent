name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'rust/**'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust library
        run: cd rust && cargo ndk -t arm64-v8a -t armeabi-v7a build --release

      - name: Copy native libraries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp rust/target/aarch64-linux-android/release/libakai_tunnel.so app/src/main/jniLibs/arm64-v8a/
          cp rust/target/armv7-linux-androideabi/release/libakai_tunnel.so app/src/main/jniLibs/armeabi-v7a/

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Build debug APK
        run: ./gradlew assembleDebug 2>& || ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: akai-agent-debug
          path: app/build/outputs/apk/debug/*.apk